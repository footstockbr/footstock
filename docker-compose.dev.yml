# ============================================================================
# docker-compose.dev.yml — Override para desenvolvimento local
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Paridade com Railway:
#   - postgres:16-alpine (mesma versão Railway Postgres)
#   - redis:7-alpine (mesma versão Railway Redis)
#   - motor: build do Dockerfile raiz (paridade prod)
#   - web: hot-reload com mount de código (dev-only, não usado em prod)
#
# URLs internas (Docker network):
#   - postgres:5432  → mapeia para postgres.railway.internal em prod
#   - redis:6379     → mapeia para redis.railway.internal em prod
#   - motor:3001     → mapeia para motor.up.railway.app em prod
#   - web:3000       → mapeia para web.up.railway.app em prod
# ============================================================================

services:
  postgres:
    ports:
      - '5433:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    volumes:
      - redis_dev_data:/data

  motor:
    volumes:
      - ./motor/src:/app/src
      - ./motor/package.json:/app/package.json
    command: npm run dev

  web:
    image: node:22-alpine
    container_name: foot-stock-web-dev
    working_dir: /app
    command: npm run dev
    ports:
      - '3000:3000'
    volumes:
      - ./footstock-next:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.docker

volumes:
  postgres_dev_data:
  redis_dev_data:
