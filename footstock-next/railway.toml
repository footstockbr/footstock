# ============================================================================
# Foot Stock — Next.js Frontend Railway Service Config
#
# IMPORTANTE: Configure o servico no painel Railway com:
#   Root Directory = footstock-next/
#
# A app Next.js tem package.json e prisma/ proprios em footstock-next/ — usar
# o subdir como build context evita conflito com o package.json do repo root
# (que pertence ao monorepo) e mantem `npx prisma generate` apontando para
# footstock-next/prisma/schema.prisma. Diverge do motor/railway.toml (que usa
# Root = / porque precisa do prisma compartilhado em /prisma), e intencional.
# ============================================================================

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# preDeployCommand: roda em uma instancia one-shot ANTES do switch de trafego
# para a nova versao. Single execution -> sem race em ambientes multi-replica.
# Falha aqui aborta o deploy (nao quebra a versao em producao).
#
# `prisma migrate deploy` e idempotente: aplica apenas migrations pendentes em
# /prisma/migrations/ (timestamped folders).
#
# HISTORICO: em 2026-05-22 (deploys a8f3aa0 + 0999491) este pre-deploy executou
# `id` mas o restante da chain `&& cd ... && node ...` desapareceu dos logs
# Railway sem stack trace. Migrations M056 + M053-new NAO foram aplicadas, bug
# de nome ficticio persistiu em prod. Fix manual via tramway proxy (RUNBOOK-016).
#
# HARDENING: pre-deploy agora usa `set -ex` (cada linha ecoada) + checks
# explicitos com exit codes distintos (10..14) para que falha silenciosa
# nao reapareca. Cada exit code mapeia uma causa raiz auditavel nos logs.
preDeployCommand = "set -ex; id; test -d /migrations || exit 10; test -f /migrations/prisma.config.js || exit 11; test -d /migrations/prisma/migrations || exit 12; test -f /migrations/node_modules/prisma/build/index.js || exit 13; test -n \"${DATABASE_URL:-}\" || exit 14; cd /migrations && node ./node_modules/prisma/build/index.js migrate deploy"
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
