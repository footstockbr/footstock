name: Motor Deploy

on:
  push:
    branches: [main]
    paths:
      - 'motor/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Deploy Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22'

      - name: Instalar dependências motor
        working-directory: motor
        run: npm ci

      - name: Test gate (motor)
        working-directory: motor
        run: npm test -- --ci --silent
        env:
          NODE_ENV: test

      - name: Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy para Railway
        run: railway up --service motor --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 45677912-3487-4978-b20b-fc7cdb8b93cf

      - name: Deploy summary
        run: |
          echo "### Motor deployado no Railway SHA ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
