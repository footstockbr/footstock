name: Motor Deploy

on:
  push:
    branches: [main]
    paths:
      - 'motor/**'
      - 'Dockerfile'
      - 'docker-compose.yml'

jobs:
  build-and-deploy:
    name: Deploy Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy para Railway
        run: railway up --service motor --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy summary
        run: |
          echo "### Motor deployado no Railway SHA ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
