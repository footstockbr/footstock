name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  validate:
    name: Lint + TypeCheck + Testes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Cache Next.js
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: footstock-next/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}

      - name: Instalar dependências
        working-directory: footstock-next
        run: npm ci --legacy-peer-deps

      - name: Gerar Prisma Client
        working-directory: footstock-next
        run: npx prisma generate

      # env-coverage roda no root porque escaneia o monorepo inteiro
      # (motor/src + footstock-next/{app,lib,src}) contra .env.example
      # na raiz. Script já filtra node_modules/dist e vars injetadas
      # pela plataforma (NEXT_PHASE, PORT, RAILWAY_REPLICA_ID).
      - name: Validar cobertura de env vars
        run: chmod +x scripts/check-env-coverage.sh && ./scripts/check-env-coverage.sh

      - name: Verificar tipos TypeScript
        working-directory: footstock-next
        run: npx tsc --noEmit

      - name: Lint ESLint
        working-directory: footstock-next
        run: npm run lint

      # Roda apenas suite unitária (sem --coverage). O threshold global de 70%
      # do jest.config.ts assume execução completa unit + contract + integration
      # — coverage real só faz sentido em rollup dedicado (ainda não wired).
      # Mesma assinatura do "Test gate" do deploy.yml para coerência cross-workflow.
      - name: Testes unitários
        working-directory: footstock-next
        run: npm test -- --ci --silent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_CI }}
          REDIS_URL: ${{ secrets.REDIS_URL_CI }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          JWT_SECRET: 'test-jwt-secret-must-be-at-least-32-chars-long'
          MOTOR_SECRET_TOKEN: 'test-motor-token-dummy-not-a-real-credential'
          NODE_ENV: test

  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate]
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
      DIRECT_URL: ${{ secrets.DIRECT_URL_CI }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      MOTOR_SECRET_TOKEN: ${{ secrets.MOTOR_SECRET_TOKEN }}
      NEXT_PUBLIC_APP_URL: 'https://footstock.com.br'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar dependências
        working-directory: footstock-next
        run: npm ci --legacy-peer-deps

      - name: Gerar Prisma Client
        working-directory: footstock-next
        run: npx prisma generate

      - name: Build Next.js
        working-directory: footstock-next
        run: npm run build
