name: Deploy Railway Web

on:
  push:
    branches: [main]
    paths:
      - 'footstock-next/**'
      - 'prisma/**'
      - 'Dockerfile'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy para Railway (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar dependências
        working-directory: footstock-next
        run: npm ci --legacy-peer-deps

      - name: Gerar Prisma Client
        working-directory: footstock-next
        run: npx prisma generate

      - name: Type-check Next.js
        working-directory: footstock-next
        run: npx tsc --noEmit

      - name: Test gate (footstock-next)
        working-directory: footstock-next
        run: npm test -- --ci --silent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_CI }}
          REDIS_URL: ${{ secrets.REDIS_URL_CI }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: 'https://test.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'test-anon-key-dummy-not-a-real-credential'
          SUPABASE_SERVICE_ROLE_KEY: 'test-service-role-key-dummy-not-real'
          JWT_SECRET: 'test-jwt-secret-must-be-at-least-32-chars-long'
          MOTOR_SECRET_TOKEN: 'test-motor-token-dummy-not-a-real-credential'
          NODE_ENV: test

      - name: DEBUG — Inspect Supabase secrets shape (temporary)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MOTOR_SECRET_TOKEN: ${{ secrets.MOTOR_SECRET_TOKEN }}
        run: |
          inspect() {
            local name="$1"; local val="$2"
            if [ -z "$val" ]; then
              echo "  $name: EMPTY/UNSET"; return
            fi
            local len=${#val}
            # detect leading/trailing whitespace
            local trimmed
            trimmed=$(echo -n "$val" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            local trim_len=${#trimmed}
            local has_ws="no"
            if [ "$len" != "$trim_len" ]; then has_ws="YES(raw_len=$len trim_len=$trim_len)"; fi
            local starts_https="no"
            case "$val" in https://*) starts_https="yes";; esac
            local has_scheme="no"
            case "$val" in *"://"*) has_scheme="yes";; esac
            local has_supabase_co="no"
            case "$val" in *".supabase.co"*) has_supabase_co="yes";; esac
            local starts_eyj="no"
            case "$val" in eyJ*) starts_eyj="yes";; esac
            echo "  $name: len=$len ws=$has_ws starts_https=$starts_https has_scheme=$has_scheme supabase_co=$has_supabase_co jwt_prefix=$starts_eyj"
          }
          echo "Supabase / build secrets shape:"
          inspect "NEXT_PUBLIC_SUPABASE_URL" "$NEXT_PUBLIC_SUPABASE_URL"
          inspect "NEXT_PUBLIC_SUPABASE_ANON_KEY" "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
          inspect "SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SERVICE_ROLE_KEY"
          inspect "JWT_SECRET" "$JWT_SECRET"
          inspect "MOTOR_SECRET_TOKEN" "$MOTOR_SECRET_TOKEN"

      - name: Build Next.js
        working-directory: footstock-next
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_CI }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MOTOR_SECRET_TOKEN: ${{ secrets.MOTOR_SECRET_TOKEN }}
          NEXT_PUBLIC_APP_URL: 'https://footstock.com.br'

      - name: Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy para Railway
        run: railway up --service web --environment production --detach --ci
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 45677912-3487-4978-b20b-fc7cdb8b93cf

      - name: Deployment summary
        run: echo "### Deployed to Railway production :rocket:" >> $GITHUB_STEP_SUMMARY
