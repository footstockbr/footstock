name: Deploy Railway Web

on:
  push:
    branches: [main]
    paths:
      - 'footstock-next/**'
      - 'prisma/**'
      - 'Dockerfile'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy para Railway (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar dependências
        working-directory: footstock-next
        run: npm ci --legacy-peer-deps

      - name: Gerar Prisma Client
        working-directory: footstock-next
        run: npx prisma generate

      - name: Type-check Next.js
        working-directory: footstock-next
        run: npx tsc --noEmit

      - name: Test gate (footstock-next)
        working-directory: footstock-next
        run: npm test -- --ci --silent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_CI }}
          REDIS_URL: ${{ secrets.REDIS_URL_CI }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: 'https://test.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'test-anon-key-dummy-not-a-real-credential'
          SUPABASE_SERVICE_ROLE_KEY: 'test-service-role-key-dummy-not-real'
          JWT_SECRET: 'test-jwt-secret-must-be-at-least-32-chars-long'
          MOTOR_SECRET_TOKEN: 'test-motor-token-dummy-not-a-real-credential'
          NODE_ENV: test

      - name: Build Next.js
        working-directory: footstock-next
        # CI Build step is a sanity gate — the deployable artifact is built by
        # Railway from footstock-next/Dockerfile (see railway.toml). That
        # Dockerfile uses build-time placeholder values for the same vars
        # (Supabase client constructors are eager at module load). Railway
        # overrides at runtime via service env. To keep CI consistent with
        # what Railway actually does, mirror those placeholders here.
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://build:build@localhost:5432/build'
          DIRECT_URL: 'postgresql://build:build@localhost:5432/build'
          NEXT_PUBLIC_SUPABASE_URL: 'https://build-placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'build-placeholder-anon-key'
          SUPABASE_SERVICE_ROLE_KEY: 'build-placeholder-service-role-key'
          REDIS_URL: 'redis://localhost:6379'
          REDIS_DISABLED: 'true'
          JWT_SECRET: 'build-jwt-secret-placeholder-32-chars-min-len'
          NEXTAUTH_SECRET: 'build-nextauth-secret-placeholder'
          MOTOR_SECRET_TOKEN: 'build-motor-token'
          NEXT_PUBLIC_APP_URL: 'https://footstock.com.br'
          SKIP_ENV_VALIDATION: 'true'

      # Aplica migrations Prisma em produção ANTES de subir o código novo,
      # para garantir que o schema do banco está alinhado com o build que
      # será deployed. Roda em ambos os dirs (root prisma/ = lineage motor,
      # footstock-next/prisma/ = lineage Next.js). Idempotente: pula
      # migrations já registradas em _prisma_migrations.
      - name: Aplicar Prisma migrations (produção)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_PROD }}
        run: |
          set -e
          echo "==> migrate deploy (root prisma/ — motor lineage)"
          npx prisma migrate deploy --schema prisma/schema.prisma
          echo "==> migrate deploy (footstock-next/prisma/ — Next.js lineage)"
          npx prisma migrate deploy --schema footstock-next/prisma/schema.prisma

      - name: Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy para Railway
        run: railway up --service web --environment production --detach --ci
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 45677912-3487-4978-b20b-fc7cdb8b93cf

      - name: Deployment summary
        run: echo "### Deployed to Railway production :rocket:" >> $GITHUB_STEP_SUMMARY
