name: Deploy Railway Web

on:
  push:
    branches: [main]
    paths:
      - 'footstock-next/**'
      - 'prisma/**'
      - 'Dockerfile'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy para Railway (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: '22'

      - name: Cache npm
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Instalar dependências
        working-directory: footstock-next
        run: npm ci --legacy-peer-deps

      - name: Gerar Prisma Client
        working-directory: footstock-next
        run: npx prisma generate

      - name: Type-check Next.js
        working-directory: footstock-next
        run: npx tsc --noEmit

      - name: Test gate (footstock-next)
        working-directory: footstock-next
        run: npm test -- --ci --silent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
          DIRECT_URL: ${{ secrets.DIRECT_URL_CI }}
          REDIS_URL: ${{ secrets.REDIS_URL_CI }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          JWT_SECRET: 'test-jwt-secret-must-be-at-least-32-chars-long'
          MOTOR_SECRET_TOKEN: 'test-motor-token-dummy-not-a-real-credential'
          NODE_ENV: test

      - name: Build Next.js
        working-directory: footstock-next
        # CI Build step is a sanity gate — the deployable artifact is built by
        # Railway from footstock-next/Dockerfile (see railway.toml). That
        # Dockerfile uses build-time placeholder values for the same vars.
        # Railway overrides at runtime via service env. To keep CI consistent
        # with what Railway actually does, mirror those placeholders here.
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://build:build@localhost:5432/build'
          DIRECT_URL: 'postgresql://build:build@localhost:5432/build'
          REDIS_URL: 'redis://localhost:6379'
          REDIS_DISABLED: 'true'
          JWT_SECRET: 'build-jwt-secret-placeholder-32-chars-min-len'
          NEXTAUTH_SECRET: 'build-nextauth-secret-placeholder'
          MOTOR_SECRET_TOKEN: 'build-motor-token'
          NEXT_PUBLIC_APP_URL: 'https://footstock.com.br'
          SKIP_ENV_VALIDATION: 'true'

      # Aplica migrations Prisma em produção ANTES de subir o código novo,
      # para garantir que o schema do banco está alinhado com o build.
      # Roda APENAS contra footstock-next/prisma — é o lineage que o
      # _prisma_migrations da prod realmente conhece (init + rss-feeds +
      # authjs). Root prisma/ (motor) tem M001..M051 que foram
      # reconciliados manualmente em 2026-05-16 (marcados como applied
      # via prisma migrate resolve); migrations novas para o motor
      # precisam ser portadas para footstock-next/prisma/ até que os
      # dois schemas sejam unificados. Idempotente.
      # footstock-next/prisma/schema.prisma declara só `provider` no
      # bloco datasource (sem `url` nem `directUrl`), então o Prisma
      # usa DATABASE_URL para tudo, inclusive migrate. DATABASE_URL_PROD
      # aponta para pgbouncer porta 6543 (transaction mode), que trava
      # em advisory locks de migrations. Aqui sobrescrevemos com o
      # DIRECT_URL (session pooler porta 5432) só para o migrate.
      - name: Aplicar Prisma migrations (produção)
        working-directory: footstock-next
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL_PROD }}
        run: npx prisma migrate deploy

      - name: Instalar Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy para Railway
        run: railway up --service web --environment production --detach --ci
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: 45677912-3487-4978-b20b-fc7cdb8b93cf

      - name: Deployment summary
        run: echo "### Deployed to Railway production :rocket:" >> $GITHUB_STEP_SUMMARY
